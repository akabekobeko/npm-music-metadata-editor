appId: net.akabekobeko.music-metadata-editor
productName: Music Metadata Editor
directories:
  output: release
  buildResources: build
files:
  - dist/**/*
  - package.json
  - "!node_modules/**/*"
asar: true
mac:
  category: public.app-category.music
  target:
    - target: dmg
      arch:
        - x64
        - arm64
    - target: zip
      arch:
        - x64
        - arm64
  artifactName: "${productName}-${version}-${arch}.${ext}"
win:
  target:
    - target: nsis
      arch:
        - x64
    - target: zip
      arch:
        - x64
  artifactName: "${productName}-${version}-${arch}.${ext}"
linux:
  category: AudioVideo;Audio
  target:
    - target: AppImage
      arch:
        - x64
    - target: deb
      arch:
        - x64
  artifactName: "${productName}-${version}-${arch}.${ext}"

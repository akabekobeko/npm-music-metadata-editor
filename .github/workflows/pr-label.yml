name: PR Label

on:
  pull_request:
    types: [opened, edited, reopened]

permissions:
  pull-requests: write

jobs:
  label:
    runs-on: ubuntu-latest
    steps:
      - name: Apply Conventional Commits prefix label
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_TITLE: ${{ github.event.pull_request.title }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          REPO: ${{ github.repository }}
        run: |
          set -eu
          # Extract the Conventional Commits type prefix from the PR title.
          # Examples:
          #   "feat: ..."        -> feat
          #   "feat(parser): ..." -> feat
          #   "feat!: ..."       -> feat
          prefix=$(printf '%s' "$PR_TITLE" | grep -oE '^[a-zA-Z]+' | head -n1 || true)
          if [ -z "$prefix" ]; then
            echo "::notice::No Conventional Commits prefix found in PR title: $PR_TITLE"
            exit 0
          fi
          echo "Detected prefix: $prefix"

          # Apply the label only when a label with that exact name already exists.
          if gh api "repos/$REPO/labels/$prefix" --silent >/dev/null 2>&1; then
            echo "Label '$prefix' exists. Adding it to PR #$PR_NUMBER."
            gh pr edit "$PR_NUMBER" --repo "$REPO" --add-label "$prefix"
          else
            echo "::notice::Label '$prefix' does not exist in $REPO. Skipping."
          fi
